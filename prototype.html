<!DOCTYPE html>
<html lang="en">
<head><meta http-equiv="Content-Type" content="text/html;
charset=UTF-8">
<title>Maze</title>
<style type="text/css">
body{
		font-family: "HelveticaNeue-Light", "Helvetica Neue Light", "Helvetica Neue",
		 Helvetica, Arial, "Lucida Grande", sans-serif;
	 padding : 15px;
	 max-width: 600px;
	 margin: auto;
}
td {
	 padding: 10px;
	 vertical-align: top;
}
</style>

<!-- Sourcing the cpm build -->
<script src="./artistoo-master/build/artistoo.js"></script>
<script src="./artistoo-master/examples/html/fpsmeter.min.js"></script>
<script>
"use strict"

let GRID_WIDTH = 170
let GRID_HEIGHT = 170

let RUPSJENOOITGENOEG = 0.95
let INIT_CHEMOKINE = 10

let config = {
	// Grid settings
	ndim : 2,
	field_size : [GRID_WIDTH,GRID_HEIGHT],
	
	// CPM parameters and configuration
	conf : {
        torus: [false, false],
        seed: 1,
        D: 0.1,
        T : 20,											// CPM temperature
				
		// Adhesion parameters:
		J: [[0,20], [20,0]] ,
		
		// VolumeConstraint parameters
		LAMBDA_V : [0,50],								// VolumeConstraint importance per cellkind
		V : [0,100],									// Target volume of each cellkind

		LAMBDA_P: [0,2],								// PerimeterConstraint importance per cellkind
		P : [0,35],										// Target perimeter of each cellkind
	},
	
	// Simulation setup and configuration
	simsettings : {
		// Cells on the grid
		NRCELLS : [3,0],								// Number of cells to seed for all
		// non-background cellkinds.
		// Runtime etc
		BURNIN : 500,
		RUNTIME : 1000,
		RUNTIME_BROWSER : "Inf",
		
		// Visualization
		zoom : 4,										// zoom in on canvas with this factor.
		
		// Output images
		SAVEIMG : true,									// Should a png image of the grid be saved
		// during the simulation?
		IMGFRAMERATE : 1,								// If so, do this every <IMGFRAMERATE> MCS.
		SAVEPATH : "output/img/Chemotaxis",				// ... And save the image in this folder.
		EXPNAME : "Chemotaxis",							// Used for the filename of output images.
		
		// Output stats etc
		STATSOUT : { browser: false, node: true }, 		// Should stats be computed?
		LOGRATE : 10									// Output stats every <LOGRATE> MCS.

	}
}

// Initialize simulation for html
let sim, meter, bc

function initialize(){
	let custommethods = {
		initializeGrid : initializeGrid,
        postMCSListener : postMCSListener,
		drawBelow: drawBelow,
        drawCanvas: drawCanvas
	}

    sim = new CPM.Simulation( config, custommethods )
    sim.g = new CPM.Grid2D([sim.C.extents[0],sim.C.extents[1]], config.torus, "Float32"),
    sim.g.diffusion = diffusion
    sim.g.neighNeumanni = neighNeumanni

	// Initial chemokine value for all cells in grid
	for (let x = 0; x < GRID_WIDTH; x++) {
		for (let y = 0; y < GRID_HEIGHT; y++) {
			sim.g.setpix([x,y], INIT_CHEMOKINE)
		}
	}

    sim.C.add( new CPM.ChemotaxisConstraint( {
        LAMBDA_CH: [0,5000],
        CH_FIELD : sim.g }
    ) )

    // Manual BugFix
    let dH = function( sourcei, targeti, src_type, tgt_type ){
        let delta = this.field.pixti( targeti ) - this.field.pixti( sourcei ) 
        let lambdachem = this.cellParameter( "LAMBDA_CH", src_type )
        return -delta*lambdachem
    }
    sim.C.getConstraint("ChemotaxisConstraint").deltaH = dH
    bc = sim.C.getConstraint("BorderConstraint")

    // console.log(sim.C.getConstraint("BorderConstraint").barriervoxels)
    // End Manuel BugFix

	meter = new FPSMeter({left:"auto", right:"5px"})
    step()
}

function step(){
    sim.step()
    meter.tick()
    if( sim.conf["RUNTIME_BROWSER"] == "Inf" | sim.time+1 < sim.conf["RUNTIME_BROWSER"] ){
		requestAnimationFrame( step )
	}
}

function initializeGrid() {
	if (!this.helpClasses['gm']) {
		this.addGridManipulator();
	}

	this.walls = createMediumMaze()
	this.C.add(new CPM.BorderConstraint({
		BARRIER_VOXELS: this.walls
	}))

    this.gm.seedCellAt(1, [160, 160])
		this.gm.seedCellAt(1, [160, 40])
		this.gm.seedCellAt(1, [40, 40])
		this.gm.seedCellAt(1, [40, 160])
}

function postMCSListener(){
	let center = [this.C.extents[0]/2,this.C.extents[1]/2]
	this.g.setpix( center, 10000+this.g.pixt(center) )
	for( let i = 1 ; i <= 10 ; i ++ ){
		this.g.diffusion( this.C.conf["D"] )
	}
    removeChemokines(this)
}

function removeChemokines(obj) {
    // TODO: CAN THIS BE OPTIMIZED?
    // This is were he eats
    for (let i = 0; i <= obj.C.extents[0]; i++){
        for (let j = 0; j <= obj.C.extents[1]; j++){
            if (sim.C.pixt([i,j]) == 1){
                obj.g.setpix([i,j], obj.g.pixt([i,j]) * RUPSJENOOITGENOEG)
            }
        }
    }
}

function drawCanvas(){
	// Add the canvas if required
	if( !this.helpClasses["canvas"] ){ this.addCanvas() }
	this.Cim.drawField( this.g )
	this.Cim.drawCellBorders( -1, "000000" )

    this.drawBelow()
}

// Draws the pixels in BARRIER_VOXELS
function drawBelow() {
	this.Cim.drawPixelSet(this.walls, "AAAAAA");
}

// Grid size: 528x100
function createEasyMaze() {
	let wallPixels = []

	wallPixels = wallPixels.concat(getWallPixels({x: 0, y: 31}, {x: 213, y: 31}))
	wallPixels = wallPixels.concat(getWallPixels({x: 0, y: 65}, {x: 213, y: 65}))
	wallPixels = wallPixels.concat(getWallPixels({x: 213, y: 0}, {x: 213, y: 30}))
	wallPixels = wallPixels.concat(getWallPixels({x: 213, y: 66}, {x: 213, y: 99}))
	wallPixels = wallPixels.concat(getWallPixels({x: 249, y: 32}, {x: 249, y: 64}))
	wallPixels = wallPixels.concat(getWallPixels({x: 249, y: 31}, {x: 527, y: 31}))
	wallPixels = wallPixels.concat(getWallPixels({x: 249, y: 65}, {x: 527, y: 65}))

	return wallPixels
}

// Grid size: 170x170
function createMediumMaze() {
	let wallPixels = []

	wallPixels = wallPixels.concat(getWallPixels({x: 33, y: 0}, {x: 33, y: 33}))
	wallPixels = wallPixels.concat(getWallPixels({x: 33, y: 67}, {x: 33, y: 135}))
	wallPixels = wallPixels.concat(getWallPixels({x: 67, y: 67}, {x: 67, y: 101}))
	wallPixels = wallPixels.concat(getWallPixels({x: 101, y: 33}, {x: 101, y: 101}))
	wallPixels = wallPixels.concat(getWallPixels({x: 101, y: 135}, {x: 101, y: 169}))
	wallPixels = wallPixels.concat(getWallPixels({x: 135, y: 67}, {x: 135, y: 101}))
	wallPixels = wallPixels.concat(getWallPixels({x: 33, y: 33}, {x: 101, y: 33}))
	wallPixels = wallPixels.concat(getWallPixels({x: 135, y: 33}, {x: 169, y: 33}))
	wallPixels = wallPixels.concat(getWallPixels({x: 33, y: 101}, {x: 67, y: 101}))
	wallPixels = wallPixels.concat(getWallPixels({x: 135, y: 101}, {x: 169, y: 101}))
	wallPixels = wallPixels.concat(getWallPixels({x: 0, y: 135}, {x: 33, y: 135}))
	wallPixels = wallPixels.concat(getWallPixels({x: 67, y: 135}, {x: 135, y: 135}))

	return wallPixels
}

// Expects two {x : Int, y: Int}, returns an array with pixels
function getWallPixels(p1, p2) {
	let sorted = inOrder(p1, p2)

	let wallPixels = []
	for (let x = sorted.smallestX; x <= sorted.largestX; x++) {
		for (let y = sorted.smallestY; y <= sorted.largestY; y++) {
			wallPixels.push([x, y])
		}
	}
	return wallPixels
}

// Expects two {x : Int, y: Int}, returns {smallestX: Int, largestX: Int, smallestY: Int, largestY: Int}
function inOrder(p1, p2) {
	return {
		smallestX: p1.x < p2.x ? p1.x : p2.x,
		largestX: p1.x >= p2.x ? p1.x : p2.x,
		smallestY: p1.y < p2.y ? p1.y : p2.y,
		largestY: p1.y >= p2.y ? p1.y : p2.y
	}
}

/** Perform a diffusion step on the grid, updating the values of all pixels
 * according to Fick's second law of diffusion.
 * @param {number} D diffusion coefficient
 * @see https://en.wikipedia.org/wiki/Diffusion#Fick's_law_and_equations
 * @see https://en.wikipedia.org/wiki/Discrete_Laplace_operator#Mesh_Laplacians
 * */
// TODO: OPTIMISE
function diffusion( D ) {
    // For synchronous updating of the grid: compute updated values in a copy
    // of the current pixels
    if( ! this._pixelsbuffer ) this.pixelsBuffer();
    for( let i of this.pixelsi() ){
		// console.log(i, this.pixti(i))
		if (bc.barriervoxels[i]) continue;
        // Diffusion: new value is current value + change.
        // the change is given by the diffusion coefficient D times the laplacian.
        this._pixelsbuffer[i] = this.pixti( i ) + D * this.laplaciani( i );
    }
    // swap the copy and the original
    [this._pixelsbuffer, this._pixels] = [this._pixels, this._pixelsbuffer];
}

// TODO: OPTIMISE
function* neighNeumanni( i, torus = this.torus ){
    // normal computation of neighbor indices (top left-middle-right, 
    // left, right, bottom left-middle-right)
    let t = i-1, l = i-this.X_STEP, r = i+this.X_STEP, b = i+1;
    
	function isBorder(j) {
		// console.log(j, j in sim.C.getConstraint("BorderConstraint").barriervoxels)
		return bc.barriervoxels[j]
	}
    // if pixel is part of one of the borders, adjust the 
    // indices accordingly
    // if torus is false, return NaN for all neighbors that cross
    // the border.

    // left border
    if( i < this.extents[1]){
        if( torus[0] ){
            l += this.extents[0] * this.X_STEP;
            yield isBorder(l) ? i : l;
        } else {
			yield i
		}
    } else {
        yield isBorder(l) ? i : l;
    }
    // right border
    if( i >= this.X_STEP*( this.extents[0] - 1 ) ){
        if( torus[0] ){
            r -= this.extents[0] * this.X_STEP;
            yield isBorder(r) ? i : r;
        } else {
			yield i
		}		
    } else {
        yield isBorder(r) ? i : r;
    }
    // top border
    if( i % this.X_STEP === 0 ){
        if( torus[1] ){
            t += this.extents[1];
            yield isBorder(t) ? i : t;
        } else {
			yield i
		}
    } else {
        yield isBorder(t) ? i : t;
    }
    // bottom border
    if( (i+1-this.extents[1]) % this.X_STEP === 0 ){
        if( torus[1] ){
            b -= this.extents[1];
            yield isBorder(b) ? i : b;
        } else {
			yield i
		}
    } else {
        yield isBorder(b) ? i : b;
    }
}

</script>
</head>
<body onload="initialize()">
	<h1>Maze</h1>
	<p>
		A maze with chemokines in CPM
	</p>
</body>
</html>
